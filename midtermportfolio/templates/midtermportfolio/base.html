<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denise Jade Inson</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,600&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream: #faf7f2;
            --cream2: #f3ede3;
            --ink: #1c1410;
            --terra: #c4622d;
            --terra-light: #e07a45;
            --sage: #8a9e8c;
            --muted: #9a8f85;
            --border: #e2d9ce;
            --card: #f6f1e9;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--cream);
            color: var(--ink);
            font-family: 'Karla', sans-serif;
            font-weight: 400;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1.4rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cream);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: 'Fraunces', serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: -0.01em;
        }

        .nav-logo span {
            color: var(--terra);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--terra);
        }

        /* MAIN */
        main {
            margin-top: 62px;
        }

        /* FOOTER */
        footer {
            padding: 3rem 2.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: var(--cream2);
        }

        footer p {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }

        .footer-links a {
            font-size: 0.8rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--terra);
        }

        /* SHARED UTILS */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2.5rem;
        }

        .section-eyebrow {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--terra);
            margin-bottom: 0.7rem;
        }

        .section-heading {
            font-family: 'Fraunces', serif;
            font-size: clamp(2rem, 4.5vw, 3.4rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        .section-heading em {
            font-style: italic;
            color: var(--terra);
        }

        /* REVEAL */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">Denise<span>.</span></div>
        <ul class="nav-links">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'portfolio' %}">Portfolio</a></li>
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2025 Denise Jade Inson — Negros Oriental State University</p>
        <div class="footer-links">
            <a href="mailto:denisejadeinson@email.com">Email</a>
            <a href="https://github.com/denisejadeinson" target="_blank">GitHub</a>
            <a href="https://facebook.com" target="_blank">Facebook</a>
        </div>
    </footer>

    <script>
        const reveals = document.querySelectorAll('.reveal');
        const observer = new IntersectionObserver(entries => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    setTimeout(() => entry.target.classList.add('visible'), i * 90);
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        reveals.forEach(el => observer.observe(el));
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
